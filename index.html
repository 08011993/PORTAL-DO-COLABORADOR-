<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portal</title>
<style>
    body { font-family: sans-serif; background: #F0F2F5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { background: #fff; padding: 30px; border-radius: 16px; width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #2563EB; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    .screen { display: none; }
    .active { display: block; }
</style>
</head>
<body>

<div id="login" class="screen active box">
    <h2 style="text-align:center">Login</h2>
    <input type="text" id="u" placeholder="Usuário/CPF">
    <input type="password" id="p" placeholder="Senha">
    <button onclick="check()">Entrar</button>
</div>

<div id="painel" class="screen box">
    <h2 style="text-align:center">Bem-vindo!</h2>
    <button onclick="location.reload()">Sair</button>
</div>

<script>
    function check() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value.trim();
        
        if (u === 'admin' && p === 'admin123') {
            alert('Admin logado!');
            document.getElementById('login').classList.remove('active');
            document.getElementById('painel').classList.add('active');
        } else if (u === '12345678901' && p === '123') {
            alert('Colaborador logado!');
            document.getElementById('login').classList.remove('active');
            document.getElementById('painel').classList.add('active');
        } else {
            alert('Dados incorretos. Verifique: Admin/admin123 ou 12345678901/123');
        }
    }
</script>
</body>
</html>
